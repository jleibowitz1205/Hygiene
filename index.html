<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hygiene Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Inter:wght@300;400;500&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --electric:  #5E10BC;
      --electric2: #7E54D9;
      --neon:      #80E55C;
      --citrine:   #F7E74B;
      --lavender:  #D4C9F4;
      --bg:        #0d0d0d;
      --surface:   #181818;
      --surface2:  #222222;
      --border:    #2a2a2a;
      --text:      #EFEDE8;
      --dim:       #888888;
      --dimmer:    #555555;
      --font-heading: 'Rubik', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-sub:     'Inter Tight', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      font-size: 16px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .brand-label {
      font-family: var(--font-sub);
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--electric2); margin-bottom: 2px;
    }
    .header-title {
      font-family: var(--font-heading);
      font-size: 28px; font-weight: 700;
      color: #fff; line-height: 1; letter-spacing: -0.5px;
    }
    .header-sub {
      font-family: var(--font-body);
      font-size: 12px; color: var(--dim);
      margin-top: 3px; font-weight: 300;
    }
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px; padding: 8px 14px;
    }
    .pulse {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--dimmer); flex-shrink: 0; transition: background 0.4s;
    }
    .pulse.active  { background: var(--neon);    animation: breathe 1.8s ease-in-out infinite; }
    .pulse.running { background: var(--citrine);  animation: breathe 0.7s ease-in-out infinite; }
    .pulse.error   { background: #ff4444; }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; box-shadow: 0 0 8px 3px currentColor; }
    }
    .status-text {
      font-family: var(--font-sub);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; color: var(--text);
    }

    main {
      flex: 1; padding: 20px;
      display: flex; flex-direction: column;
      gap: 20px; overflow-y: auto;
    }

    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: -4px; }
    .section-header .line { flex: 1; height: 1px; background: var(--border); }
    .section-title {
      font-family: var(--font-sub);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--dimmer); white-space: nowrap;
    }

    .stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .stats-row-label {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px 6px;
      border-bottom: 1px solid var(--border);
    }
    .stats-row-label .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.phone-dot { background: var(--electric2); }
    .dot.email-dot { background: var(--neon); }
    .stats-row-label span {
      font-family: var(--font-sub);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dim);
    }
    .stats-cells {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 1px; background: var(--border);
    }
    .stat-cell { background: var(--surface); padding: 14px 10px; text-align: center; }
    .stat-val {
      font-family: var(--font-heading);
      font-size: 26px; font-weight: 700;
      line-height: 1; color: #fff;
    }
    .stat-val.c-phone { color: var(--electric2); }
    .stat-val.c-email { color: var(--neon); }
    .stat-val.c-time  { color: var(--lavender); }
    .stat-key {
      font-family: var(--font-body);
      font-size: 10px; font-weight: 400;
      color: var(--dim); margin-top: 4px;
    }
    .stats-divider { height: 1px; background: var(--border); }
    .refresh-row { padding: 10px 16px; display: flex; justify-content: flex-end; }
    .refresh-btn {
      background: none; border: none; color: var(--dimmer);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      font-family: var(--font-sub); font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 0; transition: color 0.2s;
    }
    .refresh-btn:active { color: var(--electric2); }
    .refresh-btn svg { width: 13px; height: 13px; }
    .refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .run-btn {
      width: 100%; padding: 18px 20px;
      background: transparent; border: none;
      cursor: pointer; display: flex; align-items: center;
      gap: 16px; transition: background 0.15s; position: relative;
    }
    .run-btn + .run-btn { border-top: 1px solid var(--border); }
    .run-btn:active { background: rgba(94,16,188,0.12); }
    .run-btn::after {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--electric); opacity: 0; transition: opacity 0.15s;
    }
    .run-btn:active::after { opacity: 1; }
    .run-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: rgba(94,16,188,0.15);
      border: 1px solid rgba(94,16,188,0.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--electric2);
    }
    .run-icon.green {
      background: rgba(128,229,92,0.1);
      border-color: rgba(128,229,92,0.3);
      color: var(--neon);
    }
    .run-icon svg { width: 20px; height: 20px; }
    .run-text { text-align: left; flex: 1; min-width: 0; }
    .run-name {
      font-family: var(--font-heading);
      font-size: 17px; font-weight: 600;
      color: #fff; line-height: 1.1;
    }
    .run-desc {
      font-family: var(--font-body);
      font-size: 12px; color: var(--dim);
      margin-top: 3px; font-weight: 300; line-height: 1.4;
    }
    .run-chevron { color: var(--dimmer); flex-shrink: 0; }

    .poll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .poll-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 14px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .poll-btn .pb-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .poll-btn .pb-icon svg { width: 16px; height: 16px; }
    .poll-btn .pb-name {
      font-family: var(--font-heading);
      font-size: 15px; font-weight: 600;
      display: block; line-height: 1.1; margin-bottom: 4px;
    }
    .poll-btn .pb-desc {
      font-family: var(--font-body);
      font-size: 11px; color: var(--dim);
      display: block; font-weight: 300; line-height: 1.4;
    }
    .poll-btn.arm-phone { border-color: rgba(126,84,217,0.3); }
    .poll-btn.arm-phone .pb-icon { background: rgba(126,84,217,0.15); color: var(--electric2); }
    .poll-btn.arm-phone .pb-name { color: var(--electric2); }
    .poll-btn.arm-phone:active { border-color: var(--electric2); background: rgba(126,84,217,0.08); }
    .poll-btn.arm-email { border-color: rgba(128,229,92,0.25); }
    .poll-btn.arm-email .pb-icon { background: rgba(128,229,92,0.1); color: var(--neon); }
    .poll-btn.arm-email .pb-name { color: var(--neon); }
    .poll-btn.arm-email:active { border-color: var(--neon); background: rgba(128,229,92,0.07); }
    .poll-btn.kill-phone { border-color: rgba(255,68,68,0.2); }
    .poll-btn.kill-phone .pb-icon { background: rgba(255,68,68,0.1); color: #ff6666; }
    .poll-btn.kill-phone .pb-name { color: #ff6666; }
    .poll-btn.kill-phone:active { border-color: #ff4444; background: rgba(255,68,68,0.07); }
    .poll-btn.kill-email { border-color: rgba(255,68,68,0.2); }
    .poll-btn.kill-email .pb-icon { background: rgba(255,68,68,0.1); color: #ff6666; }
    .poll-btn.kill-email .pb-name { color: #ff6666; }
    .poll-btn.kill-email:active { border-color: #ff4444; background: rgba(255,68,68,0.07); }

    .kill-all-btn {
      width: 100%; background: var(--surface);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: 14px; padding: 16px 18px;
      cursor: pointer; display: flex; align-items: center;
      gap: 14px; transition: border-color 0.15s, background 0.15s;
    }
    .kill-all-btn .ka-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,68,68,0.1);
      display: flex; align-items: center; justify-content: center;
      color: #ff6666; flex-shrink: 0;
    }
    .kill-all-btn .ka-icon svg { width: 18px; height: 18px; }
    .kill-all-btn .ka-text { text-align: left; }
    .kill-all-btn .ka-name {
      font-family: var(--font-heading);
      font-size: 15px; font-weight: 600;
      color: #ff6666; display: block;
    }
    .kill-all-btn .ka-desc {
      font-family: var(--font-body);
      font-size: 11px; color: var(--dim);
      display: block; font-weight: 300; margin-top: 2px;
    }
    .kill-all-btn:active { border-color: #ff4444; background: rgba(255,68,68,0.07); }

    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 8px;
    }
    .log-header {
      padding: 12px 16px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .log-title {
      font-family: var(--font-sub);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
    }
    #logOutput {
      font-family: 'Courier New', monospace;
      font-size: 12px; line-height: 1.8;
      padding: 14px 16px; max-height: 180px;
      overflow-y: auto; color: var(--dimmer);
    }
    #logOutput .log-ok   { color: var(--neon); }
    #logOutput .log-warn { color: #ff6666; }
    #logOutput .log-info { color: var(--lavender); }
    #logOutput .log-dim  { color: var(--dimmer); }
    #logOutput::-webkit-scrollbar { width: 3px; }
    #logOutput::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #toast {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sub); font-size: 13px; font-weight: 500;
      padding: 12px 20px; border-radius: 100px;
      white-space: nowrap;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; z-index: 1000; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok   { border-color: var(--neon);     color: var(--neon); }
    #toast.warn { border-color: #ff6666;          color: #ff6666; }
    #toast.info { border-color: var(--electric2); color: var(--lavender); }

    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: flex-end;
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; background: #1a1a1a;
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-bg.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 24px;
    }
    .modal-title {
      font-family: var(--font-heading);
      font-size: 22px; font-weight: 700;
      color: #fff; margin-bottom: 8px;
    }
    .modal-body {
      font-family: var(--font-body);
      font-size: 14px; color: var(--dim);
      line-height: 1.6; margin-bottom: 28px; font-weight: 300;
    }
    .modal-actions { display: flex; gap: 12px; }
    .modal-confirm {
      flex: 1; padding: 16px;
      border: 1px solid var(--electric);
      background: var(--electric); color: #fff;
      font-family: var(--font-heading);
      font-size: 16px; font-weight: 600;
      border-radius: 12px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-confirm:active { opacity: 0.85; }
    .modal-confirm.danger {
      background: transparent;
      border-color: #ff4444; color: #ff6666;
    }
    .modal-confirm.danger:active { background: rgba(255,68,68,0.1); }
    .modal-cancel {
      flex: 1; padding: 16px;
      border: 1px solid var(--border);
      background: transparent; color: var(--dim);
      font-family: var(--font-heading);
      font-size: 16px; font-weight: 600;
      border-radius: 12px; cursor: pointer;
    }
    .modal-cancel:active { background: var(--surface2); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-top">
      <div>
        <div class="brand-label">Convergence Auto</div>
        <div class="header-title">Hygiene Control</div>
        <div class="header-sub">EmailOversight · Airtable · GAS</div>
      </div>
      <div class="status-pill">
        <span class="pulse" id="pulseIndicator"></span>
        <span class="status-text" id="statusText">—</span>
      </div>
    </div>
  </header>

  <main>

    <div class="stats-card">
      <div class="stats-row-label">
        <span class="dot phone-dot"></span>
        <span>Phone / SMS</span>
      </div>
      <div class="stats-cells">
        <div class="stat-cell">
          <div class="stat-val c-phone" id="statPhoneRemaining">—</div>
          <div class="stat-key">Remaining</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val c-phone" id="statPhoneTrigger">—</div>
          <div class="stat-key">Trigger</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val c-time" id="statLast">—</div>
          <div class="stat-key">Last Run</div>
        </div>
      </div>
      <div class="stats-divider"></div>
      <div class="stats-row-label" style="border-bottom:none;">
        <span class="dot email-dot"></span>
        <span>Email</span>
      </div>
      <div class="stats-cells">
        <div class="stat-cell">
          <div class="stat-val c-email" id="statEmailRemaining">—</div>
          <div class="stat-key">Remaining</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val c-email" id="statEmailTrigger">—</div>
          <div class="stat-key">Trigger</div>
        </div>
        <div class="stat-cell"></div>
      </div>
      <div class="refresh-row">
        <button class="refresh-btn" id="refreshBtn" onclick="fetchStatus()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <div>
      <div class="section-header">
        <span class="section-title">Run Hygiene</span>
        <div class="line"></div>
      </div>
    </div>
    <div class="run-card">
      <button class="run-btn" onclick="confirmWake('all')">
        <div class="run-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="run-text">
          <div class="run-name">Wake Up — Both</div>
          <div class="run-desc">Runs a full phone + email hygiene cycle immediately. If it exceeds the 5-min limit, polling triggers are created automatically to continue.</div>
        </div>
        <div class="run-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
      </button>
      <button class="run-btn" onclick="confirmWake('phone')">
        <div class="run-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div class="run-text">
          <div class="run-name">Phone Only</div>
          <div class="run-desc">Validates cell, home, and work numbers via EmailOversight for SMS campaigns. Sends results to Convergence on completion.</div>
        </div>
        <div class="run-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
      </button>
      <button class="run-btn" onclick="confirmWake('email')">
        <div class="run-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="run-text">
          <div class="run-name">Email Only</div>
          <div class="run-desc">Validates email addresses via EmailOversight for email campaigns. Assigns Contact IDs and fires completion notifications when done.</div>
        </div>
        <div class="run-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
      </button>
    </div>

    <div>
      <div class="section-header">
        <span class="section-title">Polling Triggers</span>
        <div class="line"></div>
      </div>
    </div>

    <div class="poll-grid">
      <button class="poll-btn arm-phone" onclick="handleArm('phone')">
        <div class="pb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="pb-name">Arm Phone</span>
        <span class="pb-desc">Creates a 5-min background trigger that auto-processes SMS campaigns</span>
      </button>
      <button class="poll-btn arm-email" onclick="handleArm('email')">
        <div class="pb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="pb-name">Arm Email</span>
        <span class="pb-desc">Creates a 5-min background trigger that auto-processes email campaigns</span>
      </button>
      <button class="poll-btn kill-phone" onclick="confirmKill('phone')">
        <div class="pb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <span class="pb-name">Kill Phone</span>
        <span class="pb-desc">Removes the phone polling trigger. Current run finishes but no further auto-runs occur</span>
      </button>
      <button class="poll-btn kill-email" onclick="confirmKill('email')">
        <div class="pb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <span class="pb-name">Kill Email</span>
        <span class="pb-desc">Removes the email polling trigger. Current run finishes but no further auto-runs occur</span>
      </button>
    </div>

    <button class="kill-all-btn" onclick="confirmKill('all')">
      <div class="ka-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </div>
      <div class="ka-text">
        <span class="ka-name">Kill All Triggers</span>
        <span class="ka-desc">Removes both phone and email polling triggers simultaneously</span>
      </div>
    </button>

    <div>
      <div class="section-header">
        <span class="section-title">Execution Log</span>
        <div class="line"></div>
      </div>
    </div>
    <div class="log-card">
      <div class="log-header">
        <span class="log-title">Recent Activity</span>
      </div>
      <div id="logOutput"><span class="log-dim">// tap refresh to load status</span></div>
    </div>

  </main>
</div>

<div id="toast"></div>

<div class="modal-bg" id="modalWake">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mWakeTitle">Start Hygiene?</div>
    <div class="modal-body" id="mWakeBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modalWake')">Cancel</button>
      <button class="modal-confirm" onclick="execWake()">Run Now</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalKill">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mKillTitle">Kill Trigger?</div>
    <div class="modal-body" id="mKillBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modalKill')">Cancel</button>
      <button class="modal-confirm danger" onclick="execKill()">Kill It</button>
    </div>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxMzRVKgBqvqbHaj53MvO9CSCiI4c3Qr9iIaRi0vCcQZXfw4_kRNHJnzVBEMsGBGbYwxw/exec';

  // ── API CALL ─────────────────────────────────────
  function callGAS(action, onSuccess, onError) {
    fetch(GAS_URL + '?action=' + action)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) { if (onError) onError(data.error); }
        else { if (onSuccess) onSuccess(data); }
      })
      .catch(function(err) { if (onError) onError(err.message); });
  }

  // ── STATE ─────────────────────────────────────────
  var _lastRunTime = null;
  var _pendingWake = null;
  var _pendingKill = null;

  // ── MODALS ────────────────────────────────────────
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-bg').forEach(function(el) {
    el.addEventListener('click', function(e) { if (e.target === el) closeModal(el.id); });
  });

  // ── TOAST ─────────────────────────────────────────
  var _toastTimer;
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type || '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { t.className = ''; }, 3000);
  }

  // ── STATUS ────────────────────────────────────────
  function setStatus(text, mode) {
    document.getElementById('pulseIndicator').className = 'pulse ' + (mode || '');
    document.getElementById('statusText').textContent = text;
  }

  function renderLog(lines) {
    var el = document.getElementById('logOutput');
    if (!lines || !lines.length) {
      el.innerHTML = '<span class="log-dim">// no recent log entries</span>';
      return;
    }
    el.innerHTML = lines.map(function(line) {
      var cls = 'log-dim';
      if (/DONE|ok:|complete/i.test(line))                  cls = 'log-ok';
      else if (/error|fail|exception/i.test(line))           cls = 'log-warn';
      else if (/starting|cycle|remaining|armed/i.test(line)) cls = 'log-info';
      return '<div class="' + cls + '">' + esc(line) + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function relTime(d) {
    if (!d) return '—';
    var diff = Math.round((Date.now() - d.getTime()) / 60000);
    if (diff < 1)  return 'now';
    if (diff < 60) return diff + 'm';
    return Math.round(diff / 60) + 'h';
  }

  function fetchStatus() {
    var btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    callGAS('getStatus', function(data) {
      btn.classList.remove('spinning');
      document.getElementById('statPhoneRemaining').textContent = data.phoneRemaining >= 0 ? data.phoneRemaining : '?';
      document.getElementById('statPhoneTrigger').textContent   = data.phoneTriggerActive ? 'ON' : 'OFF';
      document.getElementById('statEmailRemaining').textContent = data.emailRemaining >= 0 ? data.emailRemaining : '?';
      document.getElementById('statEmailTrigger').textContent   = data.emailTriggerActive ? 'ON' : 'OFF';
      if (data.lastRunTime) {
        _lastRunTime = new Date(data.lastRunTime);
        document.getElementById('statLast').textContent = relTime(_lastRunTime);
      }
      var anyActive  = data.phoneTriggerActive || data.emailTriggerActive;
      var anyPending = (data.phoneRemaining > 0) || (data.emailRemaining > 0);
      if (anyActive)       setStatus('POLLING', 'active');
      else if (anyPending) setStatus('PENDING', 'error');
      else                 setStatus('IDLE', '');
      if (data.logs) renderLog(data.logs);
    }, function(err) {
      btn.classList.remove('spinning');
      showToast('Refresh failed', 'warn');
    });
  }

  // ── WAKE UP ───────────────────────────────────────
  var wakeTitles = { all: 'Run Phone + Email?', phone: 'Run Phone Hygiene?', email: 'Run Email Hygiene?' };
  var wakeBodies = {
    all:   'Kicks off a full phone + email hygiene cycle immediately.',
    phone: 'Runs SMS phone hygiene only — validates numbers and sends results to Convergence.',
    email: 'Runs email hygiene only — validates addresses, assigns Contact IDs, fires completion notifications.'
  };
  var wakeActions = { all: 'wakeUpAll', phone: 'wakeUpPhone', email: 'wakeUpEmail' };

  function confirmWake(target) {
    _pendingWake = target;
    document.getElementById('mWakeTitle').textContent = wakeTitles[target];
    document.getElementById('mWakeBody').textContent  = wakeBodies[target];
    openModal('modalWake');
  }

  function execWake() {
    var target = _pendingWake;
    closeModal('modalWake');
    setStatus('RUNNING', 'running');
    showToast('Starting ' + target + ' hygiene…', 'info');
    callGAS(wakeActions[target], function() {
      showToast('Cycle started', 'ok');
      _lastRunTime = new Date();
      document.getElementById('statLast').textContent = 'now';
      setTimeout(fetchStatus, 4000);
    }, function(err) {
      setStatus('ERROR', 'error');
      showToast('Failed to start', 'warn');
    });
  }

  // ── ARM POLLING ───────────────────────────────────
  var armActions = { phone: 'armPhone', email: 'armEmail' };

  function handleArm(target) {
    showToast('Arming ' + target + ' polling…', 'info');
    callGAS(armActions[target], function() {
      showToast((target === 'phone' ? 'Phone' : 'Email') + ' polling armed', 'ok');
      document.getElementById(target === 'phone' ? 'statPhoneTrigger' : 'statEmailTrigger').textContent = 'ON';
      setStatus('POLLING', 'active');
    }, function(err) { showToast('Failed: ' + err, 'warn'); });
  }

  // ── KILL POLLING ──────────────────────────────────
  var killTitles = { phone: 'Kill Phone Trigger?', email: 'Kill Email Trigger?', all: 'Kill All Triggers?' };
  var killBodies = {
    phone: 'Removes the phone hygiene background trigger. Any current run will finish but no further auto-runs will occur.',
    email: 'Removes the email hygiene background trigger. Any current run will finish but no further auto-runs will occur.',
    all:   'Removes both phone and email background triggers. No further automatic processing until re-armed.'
  };
  var killActions = { phone: 'killPhone', email: 'killEmail', all: 'killAll' };

  function confirmKill(target) {
    _pendingKill = target;
    document.getElementById('mKillTitle').textContent = killTitles[target];
    document.getElementById('mKillBody').textContent  = killBodies[target];
    openModal('modalKill');
  }

  function execKill() {
    var target = _pendingKill;
    closeModal('modalKill');
    showToast('Killing ' + target + ' trigger…', 'warn');
    callGAS(killActions[target], function() {
      showToast('Trigger killed', 'warn');
      if (target === 'phone' || target === 'all') document.getElementById('statPhoneTrigger').textContent = 'OFF';
      if (target === 'email' || target === 'all') document.getElementById('statEmailTrigger').textContent = 'OFF';
      setTimeout(fetchStatus, 1000);
    }, function(err) { showToast('Failed: ' + err, 'warn'); });
  }

  // ── INIT ──────────────────────────────────────────
  window.addEventListener('load', function() { setTimeout(fetchStatus, 500); });
  setInterval(function() {
    if (_lastRunTime) document.getElementById('statLast').textContent = relTime(_lastRunTime);
  }, 60000);
</script>
</body>
</html>
